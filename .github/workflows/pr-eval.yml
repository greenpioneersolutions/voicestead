name: pr-eval

# On every PR, run the free checks, post (or update) one sticky comment that
# leads with an explicit PASS/FAIL verdict, and FAIL the job when any check
# fails — a red suite must never produce a green job or a normal-looking comment.
#
# Note: PRs from forks run with a read-only token, so the comment step cannot
# post there (continue-on-error keeps that from masking or adding failures);
# the job's own pass/fail status still reports the truth for forks.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

# One live run per PR: a new sync cancels the stale run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --quiet -r tests/requirements.txt
      - name: Run the free checks and capture a summary
        id: checks
        run: |
          status=0
          {
            echo '```'
            echo '$ python -m compileall -q tests scripts'
            python -m compileall -q tests scripts 2>&1 || status=1
            echo '$ python tests/checks/validate_repo.py'
            python tests/checks/validate_repo.py 2>&1 || status=1
            echo '$ python run_checks.py --corpus ../corpus'
            ( cd tests/checks && python run_checks.py --corpus ../corpus 2>&1 ) || status=1
            echo '$ python dogfood.py'
            ( cd tests/checks && python dogfood.py 2>&1 ) || status=1
            echo '$ python -m pytest tests -q'
            python -m pytest tests -q 2>&1 || status=1
            echo '$ python scripts/check_links.py'
            python scripts/check_links.py 2>&1 || status=1
            echo '$ python -m scripts.build_exports --check'
            python -m scripts.build_exports --check 2>&1 || status=1
            echo '```'
          } > "$RUNNER_TEMP/details.md"
          if [ "$status" = "0" ]; then verdict="PASS"; else verdict="FAIL"; fi
          {
            echo "## Voicestead checks: **$verdict**"
            echo ""
            cat "$RUNNER_TEMP/details.md"
            echo ""
            echo "> Reminder: include your **scorecard delta** in the PR — run the pinned-backend eval with a key (\`python3 tests/run_eval.py --cases tests/cases.json --backend api\`) per CONTRIBUTING.md. Every accepted behavior change needs a case."
          } > "$RUNNER_TEMP/summary.md"
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - uses: actions/github-script@v7
        if: always()
        continue-on-error: true   # fork PRs have a read-only token; the job status still reports
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.RUNNER_TEMP + '/summary.md', 'utf8');
            const marker = '<!-- voicestead-pr-eval -->';
            const full = marker + '\n' + body;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: full });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: full });
            }
      - name: Fail the job when any check failed
        if: steps.checks.outputs.status != '0'
        run: exit 1
